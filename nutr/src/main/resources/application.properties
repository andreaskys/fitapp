spring.application.name=nutrition-api

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/nutrition_clinic}
spring.datasource.username=${DB_USER:admin}
spring.datasource.password=${DB_PASS:password}

# JWT Secret Key (Requires a base64 encoded string of at least 256 bits)
application.security.jwt.secret-key=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.main.allow-bean-definition-overriding=true
